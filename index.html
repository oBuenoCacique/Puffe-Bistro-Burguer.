<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puffe Bistro Burguer | Premium Delivery</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap"
        rel="stylesheet">

    <style>
        /* CSS VARIABLES - Facilita manutenção e temas (Dark/Light) */
        :root {
            --primary: #e63946;
            --accent: #d4a373;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --success: #2a9d8f;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* RESET & BASE STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-main);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        button {
            cursor: pointer;
            border: none;
            outline: none;
            transition: var(--transition);
        }

        input,
        select,
        textarea {
            border-radius: 8px;
            padding: 12px;
            border: 1px solid #333;
            background: #252525;
            color: white;
            width: 100%;
            margin-bottom: 15px;
        }

        /* HEADER SEMÂNTICO */
        .hero {
            height: 45vh;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                url('https://images.unsplash.com/photo-1550547660-d9450f859349?q=80&w=1200&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-bottom: 3px solid var(--accent);
        }

        .hero__title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            color: var(--accent);
            text-transform: uppercase;
        }

        .hero__badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 600;
            margin-top: 15px;
            font-size: 0.9rem;
        }

        /* GRID DE PRODUTOS */
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            margin: 50px 0 30px;
            color: var(--accent);
            position: relative;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 60px;
            height: 3px;
            background: var(--accent);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #2a2a2a;
            transition: var(--transition);
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            box-shadow: var(--shadow);
        }

        .card__img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            opacity: 0.9;
        }

        .card__content {
            padding: 25px;
        }

        .card__price {
            display: block;
            font-size: 1.5rem;
            font-weight: 600;
            margin: 15px 0;
            color: var(--accent);
        }

        .btn-primary {
            background: var(--accent);
            color: var(--dark-bg);
            padding: 12px;
            border-radius: 8px;
            font-weight: 700;
            width: 100%;
        }

        .btn-primary:hover {
            filter: brightness(1.1);
        }

        /* CARRINHO LATERAL (SIDEBAR) */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 420px;
            height: 100vh;
            background: #161616;
            z-index: 1000;
            transition: var(--transition);
            box-shadow: -10px 0 50px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
        }

        .cart-sidebar.active {
            right: 0;
        }

        .cart-sidebar__header {
            padding: 25px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-sidebar__body {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
        }

        .cart-item {
            padding: 15px 0;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-item__title {
            font-weight: 600;
            font-size: 1rem;
        }

        .cart-item__sub {
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        /* FLOATING CART BUTTON */
        .cart-fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 10px 25px rgba(212, 163, 115, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            z-index: 900;
        }

        .cart-fab__count {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--primary);
            color: white;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* MODAL */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal__content {
            background: var(--card-bg);
            width: 100%;
            max-width: 500px;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--accent);
        }

        /* UTILITÁRIOS */
        .hidden {
            display: none !important;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-toggle-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-toggle {
            flex: 1;
            padding: 10px;
            background: #252525;
            color: white;
            border-radius: 8px;
        }

        .btn-toggle.active {
            background: var(--accent);
            color: var(--dark-bg);
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .cart-sidebar {
                max-width: 100%;
            }

            .hero__title {
                font-size: 2.5rem;
            }
        }
    </style>
</head>

<body>

    <header class="hero">
        <div class="hero__content">
            <h1 class="hero__title">Puffe Bistro Burguer</h1>
            <p style="letter-spacing: 5px; font-weight: 300;">EXPERIÊNCIA GASTRONÔMICA</p>
            <div id="storeStatus" class="hero__badge">Carregando status...</div>
        </div>
    </header>

    <main class="container">
        <div id="menuContainer"></div>
    </main>

    <button class="cart-fab" onclick="App.toggleCart()" aria-label="Ver Carrinho">
        🛒 <span id="cartCount" class="cart-fab__count">0</span>
    </button>

    <aside id="cartSidebar" class="cart-sidebar">
        <div class="cart-sidebar__header">
            <h2>Seu Pedido</h2>
            <button onclick="App.toggleCart()" style="background:none; color:white; font-size: 24px;">&times;</button>
        </div>
        <div class="cart-sidebar__body">
            <div id="cartItemsList"></div>

            <div id="cartSummary" class="hidden"
                style="margin-top: 20px; padding-top: 20px; border-top: 2px solid #333;">
            </div>

            <div class="checkout-form" style="margin-top: 30px;">
                <div class="btn-toggle-group">
                    <button id="btnDelivery" class="btn-toggle active"
                        onclick="App.setMode('delivery')">Entrega</button>
                    <button id="btnRetirada" class="btn-toggle" onclick="App.setMode('retirada')">Retirada</button>
                </div>

                <input type="text" id="custName" placeholder="Seu Nome Completo*" required>

                <div id="deliveryFields">
                    <input type="text" id="custAddress" placeholder="Rua, Número e Referência*">
                    <select id="custBairro">
                        <option value="">Selecione o Bairro (Taxa)*</option>
                    </select>
                </div>

                <select id="paymentMethod" onchange="App.handlePaymentChange()">
                    <option value="">Forma de Pagamento*</option>
                    <option value="Pix">Pix</option>
                    <option value="Cartão">Cartão (Máquina)</option>
                    <option value="Dinheiro">Dinheiro</option>
                </select>
                <input type="text" id="changeFor" class="hidden" placeholder="Troco para quanto?">

                <button class="btn-primary" onclick="App.checkout()" style="margin-top: 20px; font-size: 1.1rem;">
                    🚀 Enviar Pedido via WhatsApp
                </button>
            </div>
        </div>
    </aside>

    <div id="productModal" class="modal">
        <div class="modal__content">
            <h3 id="modalProductName" style="color: var(--accent); margin-bottom: 15px;"></h3>
            <div id="modalExtras"></div>
            <p style="margin: 15px 0 5px; font-size: 0.9rem;">Observações:</p>
            <textarea id="modalNote" placeholder="Ex: Sem cebola, ponto da carne..."></textarea>
            <div class="flex-between" style="margin-top: 20px;">
                <button onclick="App.closeModal()" style="background:none; color:white;">Cancelar</button>
                <button class="btn-primary" style="width: auto; padding: 12px 30px;"
                    onclick="App.addItemToCart()">Adicionar</button>
            </div>
        </div>
    </div>

            cart: [],
            mode: 'delivery',
            activeProduct: null,

            init() {
                this.renderMenu();
                this.renderBairros();
                this.updateStatus();
                this.loadPersistedCart();
                console.log("Sistema Puffe Bistro Inicializado.");
            },

            // RENDERIZAÇÃO DINÂMICA
            renderMenu() {
                const container = document.getElementById('menuContainer');
                container.innerHTML = this.menu.map(section => `
                    <section>
                        <h2 class="section-title">${section.category}</h2>
                        <div class="products-grid">
                            ${section.items.map(item => this.cardTemplate(item)).join('')}
                        </div>
                    </section>
                `).join('');
            },

            cardTemplate(item) {
                return `
                    <article class="card">
                        <img src="${item.img}" alt="${item.name}" class="card__img" loading="lazy">
                        <div class="card__content">
                            <h3>${item.name}</h3>
                            <p style="font-size: 0.9rem; color: var(--text-dim); margin-top: 5px;">${item.desc}</p>
                            <span class="card__price">R$ ${item.price.toFixed(2)}</span>
                            <button class="btn-primary" onclick="App.openModal(${item.id})">Personalizar & Adicionar</button>
                        </div>
                    </article>
                `;
            },

            renderBairros() {
                const select = document.getElementById('custBairro');
                for (let b in this.config.bairros) {
                    select.innerHTML += `<option value="${b}">${b} (R$ ${this.config.bairros[b].toFixed(2)})</option>`;
                }
                select.addEventListener('change', () => this.updateTotals());
            },

            // LÓGICA DO CARRINHO & MODAL
            openModal(id) {
                let found = null;
                this.menu.forEach(cat => {
                    const item = cat.items.find(i => i.id === id);
                    if (item) found = item;
                });

                this.activeProduct = found;
                document.getElementById('modalProductName').textContent = found.name;
                document.getElementById('modalExtras').innerHTML = found.extras ? found.extras.map(ex => `
                    <label style="display:flex; align-items:center; gap:10px; margin: 10px 0;">
                        <input type="checkbox" value="${ex}" style="width:20px; margin:0"> ${ex} (+ R$ 5,00)
                    </label>
                `).join('') : '<p style="color:var(--text-dim)">Sem adicionais para este item.</p>';

                document.getElementById('productModal').classList.add('active');
            },

            closeModal() {
                document.getElementById('productModal').classList.remove('active');
                document.getElementById('modalNote').value = "";
            },

            addItemToCart() {
                const selectedExtras = Array.from(document.querySelectorAll('#modalExtras input:checked')).map(el => el.value);
                const note = document.getElementById('modalNote').value;

                const itemEntry = {
                    ...this.activeProduct,
                    instanceId: Date.now(),
                    selectedExtras,
                    note,
                    finalPrice: this.activeProduct.price + (selectedExtras.length * 5)
                };

                this.cart.push(itemEntry);
                this.syncCart();
                this.closeModal();
                this.toggleCart(true); // Abre o carrinho após adicionar
            },

            removeItem(instanceId) {
                this.cart = this.cart.filter(i => i.instanceId !== instanceId);
                this.syncCart();
            },

            syncCart() {
                localStorage.setItem('puffe_cart', JSON.stringify(this.cart));
                this.renderCartUI();
            },

            loadPersistedCart() {
                const saved = localStorage.getItem('puffe_cart');
                if (saved) {
                    this.cart = JSON.parse(saved);
                    this.renderCartUI();
                }
            },

            renderCartUI() {
                const list = document.getElementById('cartItemsList');
                document.getElementById('cartCount').textContent = this.cart.length;

                if (this.cart.length === 0) {
                    list.innerHTML = `<p style="text-align:center; padding: 40px 0; color: var(--text-dim);">Seu carrinho está vazio.</p>`;
                    document.getElementById('cartSummary').classList.add('hidden');
                    return;
                }

                document.getElementById('cartSummary').classList.remove('hidden');
                list.innerHTML = this.cart.map(item => `
                    <div class="cart-item">
                        <div>
                            <p class="cart-item__title">${item.name}</p>
                            <p class="cart-item__sub">${item.selectedExtras.join(', ') || 'Sem adicionais'}</p>
                            ${item.note ? `<p class="cart-item__sub"><i>Obs: ${item.note}</i></p>` : ''}
                        </div>
                        <div style="text-align:right">
                            <p>R$ ${item.finalPrice.toFixed(2)}</p>
                            <button onclick="App.removeItem(${item.instanceId})" style="color:var(--primary); background:none; font-size:0.8rem;">Remover</button>
                        </div>
                    </div>
                `).join('');    
                this.updateTotals();
            },

            updateTotals() {
                const subtotal = this.cart.reduce((acc, curr) => acc + curr.finalPrice, 0);
                const bairro = document.getElementById('custBairro').value;
                const taxa = (this.mode === 'delivery' && bairro) ? this.config.bairros[bairro] : 0;
                const total = subtotal + taxa;

                document.getElementById('cartSummary').innerHTML = `
                    <div class="flex-between"><p>Subtotal:</p> <p>R$ ${subtotal.toFixed(2)}</p></div>
                    <div class="flex-between"><p>Taxa de Entrega:</p> <p>R$ ${taxa.toFixed(2)}</p></div>
                    <div class="flex-between" style="font-size:1.4rem; font-weight:600; color:var(--accent); margin-top:10px;">
                        <p>Total:</p> <p>R$ ${total.toFixed(2)}</p>
                    </div>
                `;
            },

            // CHECKOUT & STATUS
            setMode(val) {
                this.mode = val;
                document.getElementById('btnDelivery').classList.toggle('active', val === 'delivery');
                document.getElementById('btnRetirada').classList.toggle('active', val === 'retirada');
                document.getElementById('deliveryFields').classList.toggle('hidden', val === 'retirada');
                this.updateTotals();
            },

            handlePaymentChange() {
                const val = document.getElementById('paymentMethod').value;
                document.getElementById('changeFor').classList.toggle('hidden', val !== 'Dinheiro');
            },

            toggleCart(forceOpen = false) {
                const sidebar = document.getElementById('cartSidebar');
                forceOpen ? sidebar.classList.add('active') : sidebar.classList.toggle('active');
            },

            updateStatus() {
                const hour = new Date().getHours();
                const isOpen = hour >= 18 && hour < 24;
                const el = document.getElementById('storeStatus');
                el.textContent = isOpen ? "🟢 ABERTO AGORA" : "🔴 FECHADO (ABRE ÀS 18H)";
                el.style.backgroundColor = isOpen ? "rgba(42, 157, 143, 0.2)" : "rgba(230, 57, 70, 0.2)";
                el.style.color = isOpen ? "var(--success)" : "var(--primary)";
            },

            checkout() {
                if (this.cart.length === 0) return alert("Adicione itens ao carrinho primeiro!");

                const nome = document.getElementById('custName').value;
                const bairro = document.getElementById('custBairro').value;
                const pag = document.getElementById('paymentMethod').value;

                if (!nome || !pag || (this.mode === 'delivery' && !bairro)) {
                    return alert("Por favor, preencha todos os campos obrigatórios (*)");
                }

                // CONSTRUÇÃO DA MENSAGEM PROFISSIONAL
                let msg = `*NOVO PEDIDO - PUFFE BISTRO*\n`;
                msg += `------------------------------\n`;
                msg += `👤 *Cliente:* ${nome}\n`;
                msg += `🛵 *Tipo:* ${this.mode === 'delivery' ? 'ENTREGA' : 'RETIRADA NO LOCAL'}\n`;
                if (this.mode === 'delivery') {
                    msg += `📍 *Endereço:* ${document.getElementById('custAddress').value}\n`;
                    msg += `🏘️ *Bairro:* ${bairro}\n`;
                }
                msg += `💳 *Pagamento:* ${pag}\n`;
                if (pag === 'Dinheiro' && document.getElementById('changeFor').value) {
                    msg += `💵 *Troco para:* R$ ${document.getElementById('changeFor').value}\n`;
                }

                msg += `\n*ITENS DO PEDIDO:*\n`;
                this.cart.forEach((item, index) => {
                    msg += `${index + 1}. ${item.name} (R$ ${item.finalPrice.toFixed(2)})\n`;
                    if (item.selectedExtras.length > 0) msg += `   + _${item.selectedExtras.join(', ')}_\n`;
                    if (item.note) msg += `   _Nota: ${item.note}_\n`;
                });

                const totalText = document.querySelector('#cartSummary div:last-child p:last-child').innerText;
                msg += `\n💰 *TOTAL: ${totalText}*`;

                const encodedMsg = encodeURIComponent(msg);
                window.open(`https://wa.me/${this.config.whatsapp}?text=${encodedMsg}`, '_blank');

                // Opcional: Limpar carrinho após sucesso
                this.cart = []; this.syncCart();
            }
        };

        // Inicia a aplicação quando o DOM estiver pronto
        document.addEventListener('DOMContentLoaded', () => App.init());
    </script>
</body>

</html>
